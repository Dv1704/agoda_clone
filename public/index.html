<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agoda Pipeline Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            font-family: 'Outfit', sans-serif;
            text-decoration: none;
        }

        .btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.7;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
            margin-bottom: 30px;
        }

        .glass-panel:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.3s;
        }

        .metric-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .metric-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 800;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-idle { background: rgba(148, 163, 184, 0.2); color: var(--text-muted); }
        .status-running { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .status-failed { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .terminal {
            background: #020617;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #1e293b;
            color: #a5b4fc;
        }

        .terminal p {
            margin: 5px 0;
            line-height: 1.4;
        }

        .terminal .highlight {
            color: #34d399;
        }

        .terminal .error {
            color: #f87171;
        }

        /* Scrolbar Styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading Dots */
        .loading:after {
            content: ' .';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            40% { color: white; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0); }
            60% { text-shadow: .25em 0 0 white, .5em 0 0 rgba(0,0,0,0); }
            80%, 100% { text-shadow: .25em 0 0 white, .5em 0 0 white; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Agoda Data Pipeline</h1>
            <div class="header-actions">
                <a href="/swagger/index.html" target="_blank" class="btn btn-secondary">View Swagger Docs</a>
                <button id="runBtn" class="btn" onclick="runPipeline()">Run Pipeline</button>
            </div>
        </header>

        <div class="dashboard-grid glass-panel" style="margin-bottom: 20px;">
            <div class="metric-card">
                <div class="metric-title">Pipeline Status</div>
                <div class="metric-value">
                    <span id="statusBadge" class="status-badge status-idle">IDLE</span>
                </div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Started At</div>
                <div class="metric-value" id="startTimeVal">--:--:--</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Duration</div>
                <div class="metric-value" id="durationVal">0.00s</div>
            </div>
        </div>

        <div class="glass-panel">
            <h2 style="margin-top:0; font-weight:600; font-size:1.4rem;">Live Execution Logs</h2>
            <div id="terminal" class="terminal">
                <p>Ready to orchestrate. Click "Run Pipeline" to begin.</p>
            </div>
        </div>
    </div>

    <script>
        let pollInterval;
        let isPolling = false;

        async function runPipeline() {
            const btn = document.getElementById('runBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading">Running</span>';
            
            document.getElementById('terminal').innerHTML = '<p>Initializing pipeline execution...</p>';
            
            try {
                const response = await fetch('/api/v1/run', { method: 'POST' });
                if (!response.ok) {
                    throw new Error('Pipeline was already running or failed to start.');
                }
                
                if (!isPolling) {
                    startPolling();
                }
            } catch (err) {
                appendLog(`<p class="error">${err.message}</p>`);
                btn.disabled = false;
                btn.innerHTML = 'Run Pipeline';
            }
        }

        function startPolling() {
            isPolling = true;
            pollStatus();
            pollInterval = setInterval(pollStatus, 1000);
        }

        function stopPolling() {
            isPolling = false;
            clearInterval(pollInterval);
            const btn = document.getElementById('runBtn');
            btn.disabled = false;
            btn.innerHTML = 'Run Pipeline';
        }

        async function pollStatus() {
            try {
                const res = await fetch('/api/v1/status');
                const data = await res.json();
                
                // Update Badge
                const badge = document.getElementById('statusBadge');
                if (data.is_running) {
                    badge.className = 'status-badge status-running';
                    badge.innerHTML = 'RUNNING';
                } else if (data.benchmark && data.benchmark.status !== 'Running') {
                    if (data.benchmark.status === 'Completed') {
                        badge.className = 'status-badge status-completed';
                        badge.innerHTML = 'COMPLETED';
                    } else {
                        badge.className = 'status-badge status-failed';
                        badge.innerHTML = 'FAILED';
                    }
                }

                // Update metrics
                if (data.benchmark) {
                    const start = new Date(data.benchmark.start_time);
                    document.getElementById('startTimeVal').innerText = start.toLocaleTimeString();

                    if (data.benchmark.status === 'Running') {
                        const now = new Date();
                        const diff = (now - start) / 1000;
                        document.getElementById('durationVal').innerText = diff.toFixed(1) + 's';
                    } else if (data.benchmark.duration) {
                        document.getElementById('durationVal').innerText = data.benchmark.duration;
                    }
                }

                // Update terminal logs
                const term = document.getElementById('terminal');
                if (data.logs && data.logs.length > 0) {
                    const logsHtml = data.logs.map(log => {
                        let clazz = '';
                        if (log.includes('✅') || log.includes('🎉')) clazz = 'highlight';
                        if (log.includes('❌') || log.includes('🔴')) clazz = 'error';
                        return `<p class="${clazz}">${log.replace(/\\n/g, '<br>')}</p>`;
                    }).join('');
                    
                    // Only update and scroll if logs changed length 
                    // (simplistic check, assumes logs only append)
                    const currentLogCount = term.querySelectorAll('p').length;
                    if (data.logs.length !== currentLogCount) {
                        term.innerHTML = logsHtml;
                        term.scrollTop = term.scrollHeight; // Auto-scroll
                    }
                }

                if (!data.is_running && isPolling) {
                    stopPolling();
                }

            } catch (err) {
                console.error("Failed to poll status", err);
            }
        }
        
        // Initial Poll to check if already running when page loads
        pollStatus().then(() => {
            const badge = document.getElementById('statusBadge');
            if(badge.innerText === 'RUNNING') {
                document.getElementById('runBtn').disabled = true;
                document.getElementById('runBtn').innerHTML = '<span class="loading">Running</span>';
                startPolling();
            }
        });
    </script>
</body>
</html>
